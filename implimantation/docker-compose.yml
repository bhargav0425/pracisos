version: '3.8'

services:
  # --- Authentication Database ---
  postgres:
    image: postgres:16-alpine
    container_name: pracisos-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Booking Database ---
  postgres-booking:
    image: postgres:16-alpine
    container_name: pracisos-booking-db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5434:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Charting Database ---
  postgres-charting:
    image: postgres:16-alpine
    container_name: pracisos-charting-db
    environment:
      POSTGRES_DB: charting_db
      POSTGRES_USER: charting_user
      POSTGRES_PASSWORD: charting_pass
    ports:
      - "5435:5432"
    volumes:
      - charting_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charting_user -d charting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Billing Database ---
  postgres-billing:
    image: postgres:16-alpine
    container_name: pracisos-billing-db
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    ports:
      - "5436:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: pracisos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Kafka Broker (KRaft Mode) ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: pracisos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Authentication Service ---
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: pracisos-auth-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      JWT_SECRET: your-256-bit-secret-key-here-change-in-production-your-256-bit-secret-key-here-change-in-production
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Booking Service ---
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: pracisos-booking-service
    environment:
      DB_HOST: postgres-booking
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
      JWT_SECRET: your-256-bit-secret-key-here-change-in-production-your-256-bit-secret-key-here-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8081:8081"
    depends_on:
      postgres-booking:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Charting Service ---
  charting-service:
    build:
      context: .
      dockerfile: charting-service/Dockerfile
    container_name: pracisos-charting-service
    environment:
      DB_HOST: postgres-charting
      DB_PORT: 5432
      DB_NAME: charting_db
      DB_USER: charting_user
      DB_PASSWORD: charting_pass
      JWT_SECRET: your-256-bit-secret-key-here-change-in-production-your-256-bit-secret-key-here-change-in-production
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8082:8082"
    depends_on:
      postgres-charting:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Billing Service ---
  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: pracisos-billing-service
    environment:
      DB_HOST: postgres-billing
      DB_PORT: 5432
      DB_NAME: billing_db
      DB_USER: billing_user
      DB_PASSWORD: billing_pass
      JWT_SECRET: your-256-bit-secret-key-here-change-in-production-your-256-bit-secret-key-here-change-in-production
      KAFKA_BOOTSTRAP: kafka:29092
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    ports:
      - "8083:8083"
    depends_on:
      postgres-billing:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- Frontend SPA (Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pracisos-frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - booking-service
      - charting-service
      - billing-service

volumes:
  auth_postgres_data:
  booking_postgres_data:
  charting_postgres_data:
  billing_postgres_data:
